name: Release

# Builds Claake Code for macOS (universal), Windows and Linux, signs the artifacts
# with the Tauri updater key, and publishes them — together with the
# auto-generated `latest.json` manifest — to a GitHub Release.
#
# Trigger: push a semver tag like `v0.2.0`. The workflow creates a *draft*
# release first; once all platforms upload their bundles, you can review and
# publish it from the GitHub UI. The in-app updater fetches
# `https://github.com/WilliamPeynichou/ClaakeCode/releases/latest/download/latest.json`,
# so the release must be marked "latest" (which is the default once published).
#
# Required repository secrets:
#   * TAURI_SIGNING_PRIVATE_KEY          — content of .tauri-keys/claakecode.key
#   * TAURI_SIGNING_PRIVATE_KEY_PASSWORD — empty string if you generated the key without a password
#
# Optional macOS notarization. Without these, macOS artifacts can still be built,
# but Gatekeeper may warn on first launch until notarization is configured.
#   * APPLE_CERTIFICATE                  — base64-encoded .p12 Developer ID cert
#   * APPLE_CERTIFICATE_PASSWORD         — password for the .p12
#   * APPLE_ID                           — Apple ID email
#   * APPLE_PASSWORD                     — app-specific password
#   * APPLE_TEAM_ID                      — Apple Developer team identifier
# Optional:
#   * APPLE_SIGNING_IDENTITY             — e.g. "Developer ID Application: Your Name (TEAMID)"
#   * APPLE_PROVIDER_SHORT_NAME          — provider short name when the Apple ID has multiple teams

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Creates the draft release first so every platform job can attach to it.
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag_name: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.resolve-tag.outputs.tag }}";
            const version = tag.replace(/^v/, "");
            const displayVersion = version.startsWith("0.")
              ? version.slice(2)
              : version.replace(/\.0$/, "");
            const existing = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = existing.find((candidate) => candidate.tag_name === tag);
            if (release) {
              core.info(`Reusing existing release ${release.id} for ${tag}`);
              return release.id;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Claake Code ${displayVersion}`,
              body: `Claake Code ${displayVersion}\n\nDownloads below. The desktop app will auto-update existing installs.`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build-tauri:
    name: Build (${{ matrix.platform.name }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS universal binary — one .dmg / .app.tar.gz that runs on Intel + Apple Silicon.
          - name: macos-universal
            os: macos-latest
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri_args: "--target universal-apple-darwin --config src-tauri/tauri.sidecars.conf.json --ignore-version-mismatches"
          # Windows x64 installer bundles — MSI + NSIS.
          - name: windows-x64
            os: windows-2022
            rust_targets: "x86_64-pc-windows-msvc"
            tauri_args: "--target x86_64-pc-windows-msvc --config src-tauri/tauri.sidecars.conf.json --ignore-version-mismatches"
          # Linux x64 bundles — .deb + AppImage.
          - name: linux-x64
            os: ubuntu-22.04
            rust_targets: "x86_64-unknown-linux-gnu"
            tauri_args: "--target x86_64-unknown-linux-gnu --config src-tauri/tauri.sidecars.conf.json --ignore-version-mismatches"
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm dependencies
        run: npm ci

      # Workaround for the well-known `bundle_dmg.sh` hang on GitHub macOS
      # runners: Finder + DiskImageMounter aren't warmed up in the headless
      # session, so the first AppleScript call inside bundle_dmg.sh races and
      # fails. Pre-launching Finder + idling a couple seconds fixes it
      # reliably. See tauri-apps/tauri#3055.
      - name: Prep macOS for DMG bundling
        if: runner.os == 'macOS'
        run: |
          sudo killall Finder 2>/dev/null || true
          open -a Finder
          sleep 3

      - name: Bypass macOS signing secrets
        id: macos-signing
        if: runner.os == 'macOS'
        run: |
          echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Bypassing macOS signing/notarization in CI."
          echo "::warning::No APPLE_* variables are exported to tauri-action, so Tauri will build unsigned macOS artifacts."

      - name: Export optional macOS signing variables
        if: runner.os == 'macOS' && steps.macos-signing.outputs.has_secrets == 'true'
        env:
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME_SECRET: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY_SECRET" ]; then
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_PROVIDER_SHORT_NAME_SECRET" ]; then
            echo "APPLE_PROVIDER_SHORT_NAME=$APPLE_PROVIDER_SHORT_NAME_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Build & publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.tauri_args }}
          # tauri-action auto-generates latest.json when:
          #   - `bundle.createUpdaterArtifacts` is true (we set this)
          #   - the updater plugin is configured (we set this)
          updaterJsonPreferNsis: false

      - name: Validate macOS notarization
        if: runner.os == 'macOS' && steps.macos-signing.outputs.has_secrets == 'true'
        run: |
          APP_PATH=$(find target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No macOS .app bundle found to validate."
            exit 1
          fi
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      # Publish a *stable-named* copy of the macOS DMG so the landing page
      # can hard-link to `releases/latest/download/Claake_Code_universal.dmg`
      # without needing to know the version. Tauri names the DMG with the
      # version embedded (e.g. `Claake_Code_0.1.2_universal.dmg`), so we make an
      # additional version-less upload.
      - name: Upload version-less DMG alias
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH=$(ls target/universal-apple-darwin/release/bundle/dmg/Claake*_*_universal.dmg | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG produced — skipping alias upload."
            exit 0
          fi
          cp "$DMG_PATH" "$(dirname "$DMG_PATH")/Claake_Code_universal.dmg"
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            "$(dirname "$DMG_PATH")/Claake_Code_universal.dmg" \
            --clobber

      # Same trick on Windows: expose version-less NSIS + MSI installers so
      # the landing page can hard-link to
      # `releases/latest/download/Claake_Code_x64-setup.exe` (and `.msi`).
      - name: Upload version-less Windows aliases
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          NSIS_SRC=$(ls target/x86_64-pc-windows-msvc/release/bundle/nsis/Claake*_*_x64-setup.exe 2>/dev/null | head -1 || true)
          MSI_SRC=$(ls target/x86_64-pc-windows-msvc/release/bundle/msi/Claake*_*_x64_*.msi 2>/dev/null | head -1 || true)
          if [ -n "$NSIS_SRC" ]; then
            ALIAS="$(dirname "$NSIS_SRC")/Claake_Code_x64-setup.exe"
            cp "$NSIS_SRC" "$ALIAS"
            gh release upload "${{ needs.create-release.outputs.tag_name }}" "$ALIAS" --clobber
          else
            echo "No NSIS installer produced - skipping NSIS alias."
          fi
          if [ -n "$MSI_SRC" ]; then
            ALIAS="$(dirname "$MSI_SRC")/Claake_Code_x64.msi"
            cp "$MSI_SRC" "$ALIAS"
            gh release upload "${{ needs.create-release.outputs.tag_name }}" "$ALIAS" --clobber
          else
            echo "No MSI installer produced - skipping MSI alias."
          fi

      # Same trick on Linux: expose version-less AppImage + .deb so the
      # landing page can hard-link to
      # `releases/latest/download/Claake_Code_amd64.AppImage` (and `.deb`).
      - name: Upload version-less Linux aliases
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APPIMG_SRC=$(ls target/x86_64-unknown-linux-gnu/release/bundle/appimage/*_*_amd64.AppImage 2>/dev/null | head -1 || true)
          DEB_SRC=$(ls target/x86_64-unknown-linux-gnu/release/bundle/deb/*_*_amd64.deb 2>/dev/null | head -1 || true)
          if [ -n "$APPIMG_SRC" ]; then
            ALIAS="$(dirname "$APPIMG_SRC")/Claake_Code_amd64.AppImage"
            cp "$APPIMG_SRC" "$ALIAS"
            gh release upload "${{ needs.create-release.outputs.tag_name }}" "$ALIAS" --clobber
          else
            echo "No AppImage produced - skipping AppImage alias."
          fi
          if [ -n "$DEB_SRC" ]; then
            ALIAS="$(dirname "$DEB_SRC")/Claake_Code_amd64.deb"
            cp "$DEB_SRC" "$ALIAS"
            gh release upload "${{ needs.create-release.outputs.tag_name }}" "$ALIAS" --clobber
          else
            echo "No .deb produced - skipping .deb alias."
          fi

  finalize-release:
    name: Finalize release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Flip the release from draft → published so end-users can fetch
            // it via `releases/latest/download/latest.json`.
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              make_latest: "true",
            });
